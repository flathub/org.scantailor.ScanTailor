app-id: org.scantailor.ScanTailor
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: scantailor
finish-args:
  - --socket=x11
  - --share=ipc
  - --filesystem=host
cleanup:
  - '*.a'
  - '*.la'
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/man
modules:
  - qt4/qt4-4.8.7-minimal.json

  - name: boost
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.68.0/source/boost_1_68_0.tar.bz2
        sha256: 7f6130bc3cf65f56a618888ce9d5ea704fa10b462be126ad053e80e553d6d8b7
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app --with-libraries=test,system,signals
      - ./b2 -j "${FLATPAK_BUILDER_N_JOBS}" install

  - name: scantailor
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    post-install:
      - install -Dm0644 org.scantailor.ScanTailor.metainfo.xml -t /app/share/metainfo/
      - install -Dm0644 org.scantailor.ScanTailor.desktop -t /app/share/applications/
      - install -Dm0644 org.scantailor.ScanTailor.xml -t /app/share/mime/packages/
      - install -Dm0644 resources/appicon.svg /app/share/icons/hicolor/scalable/apps/org.scantailor.ScanTailor.svg
    sources:
      - type: git
        url: https://github.com/scantailor/scantailor.git
        tag: RELEASE_0_9_12_1
        commit: 3ad43849bd94cd1056303e749524c45e21febeca
      - type: file
        path: org.scantailor.ScanTailor.desktop
      - type: file
        path: org.scantailor.ScanTailor.metainfo.xml
      - type: file
        path: org.scantailor.ScanTailor.xml
      - type: patch
        path: scantailor-square-appicon.patch

